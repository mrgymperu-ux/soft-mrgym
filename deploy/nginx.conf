# nginx.conf - Reverse proxy + static file server
# Un solo puerto (LISTEN_PORT, reemplazado por start.sh con $PORT)

worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Logs a stdout/stderr para que Render los muestre
    access_log /dev/stdout;

    # Gzip para JS/CSS/HTML
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 256;

    server {
        listen LISTEN_PORT;
        server_name _;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ============================================================
        # FRONTEND-STAFF (panel principal): raíz /
        # ============================================================
        location / {
            root /app/frontend-staff;
            index login.html;
            try_files $uri $uri/ /login.html;
        }

        # ============================================================
        # FRONTEND-ALUMNO: /alumno/
        # ============================================================
        location /alumno/ {
            alias /app/frontend-alumno/;
            index login.html;
            try_files $uri $uri/ /alumno/login.html;
        }

        # ============================================================
        # FRONTEND-PROFESOR: /profesor/
        # ============================================================
        location /profesor/ {
            alias /app/frontend-profesor/;
            index login.html;
            try_files $uri $uri/ /profesor/login.html;
        }

        # ============================================================
        # API BACKEND: /api/ y rutas directas (/auth/, /clientes/, etc.)
        # ============================================================
        # Todas las rutas de la API pasan al backend en :8000
        location ~ ^/(ping|health|sync-version|auth|auditoria|agenda|gym|gym-actual|usuarios|clientes|dashboard|membresias|productos|ventas|asistencias|progreso|tipos-ejercicio|rutinas|paquetes-rutina|equipamiento-gimnasio|nutricion|alimentos|paquetes-nutricion|retos|empleados|puestos|clases|salas|reservas-sala|planilla|pagos-planilla|pagos-membresia|servicios|cargos-servicio|pagos-servicio|medidas|configuracion|metas|comisiones|reportes|clientes-historicos|saas|suscripcion|portal-alumno|portal-profesor|counter|whatsapp|ingresos|conceptos-ingreso|otros-ingresos|egresos|gastos|compras|rutina-dias|rutina-ejercicios|cliente-membresias|asistencias-empleado|uploads)(/|$) {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Docs de la API (Swagger UI)
        location /docs {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
        }
        location /redoc {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
        }
    }
}
