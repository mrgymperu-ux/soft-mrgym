<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Agenda</title><link rel="stylesheet" href="css/styles.css"></head><body>
<div class="page"><div class="page-header"><h1>Agenda</h1><p>Elige una agenda y programa tu asistencia.</p></div><div id="agendas" class="dias-nav"></div><div id="contenido" class="estado-cargando">Cargando...</div></div>
<nav class="nav-bottom"><a href="mi-perfil.html" class="nav-btn"><span>👤</span><span>Perfil</span></a><a href="mi-rutina.html" class="nav-btn"><span>💪</span><span>Rutina</span></a><a href="agenda.html" class="nav-btn activo"><span>📅</span><span>Agenda</span></a><a href="mi-nutricion.html" class="nav-btn"><span>🥗</span><span>Nutrición</span></a><a href="mi-progreso.html" class="nav-btn"><span>📈</span><span>Progreso</span></a><a href="retos.html" class="nav-btn"><span>🏆</span><span>Retos</span></a><button class="nav-btn" onclick="cerrarSesion()"><span>🚪</span><span>Salir</span></button></nav>
<script src="js/api.js"></script><script>
requireAuth();let clases=[],agendaActiva="";const fmtHora=x=>new Date(x).toLocaleTimeString("es-PE",{hour:"2-digit",minute:"2-digit"});
async function cargar(){clases=await apiFetch("/portal-alumno/agenda");const nombres=[...new Set(clases.map(c=>c.agenda))];agendaActiva=nombres[0]||"";document.getElementById("agendas").innerHTML=nombres.map((n,i)=>`<button class="dia-pill ${i===0?'activo':''}" onclick="elegirAgenda('${n.replace(/'/g,"\\'")}',this)">${n}</button>`).join("");render()}
function elegirAgenda(n,el){agendaActiva=n;document.querySelectorAll('.dia-pill').forEach(x=>x.classList.remove('activo'));el.classList.add('activo');render()}
function render(){const lista=clases.filter(c=>c.agenda===agendaActiva);document.getElementById("contenido").innerHTML=lista.length?lista.map(c=>`<div class="card"><div class="card-body agenda-item"><div><strong>${c.nombre}</strong><span>${formatFecha(c.fecha)} · ${fmtHora(c.hora_inicio)}${c.sala?' · '+c.sala:''}</span><small>${c.profesor||''}</small></div>${c.permite_registro?`<button class="btn-agenda ${c.inscrito?'inscrito':''}" onclick="inscribir(${c.id})">${c.inscrito?'Inscrito ✓':'Programar'}</button>`:''}</div></div>`).join(''):'<div class="vacio-plan">No hay actividades programadas.</div>'}
async function inscribir(id){await apiFetch(`/portal-alumno/agenda/${id}/inscripcion`,{method:'POST'});await cargar()}cargar();
</script></body></html>
