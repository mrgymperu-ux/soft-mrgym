<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Agenda</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="page agenda-page">
  <div class="agenda-selector">
    <label for="selector-sala">Agenda</label>
    <select id="selector-sala" onchange="elegirAgenda(this.value)"></select>
  </div>
  <div class="agenda-cabecera">
    <button class="agenda-hoy" type="button" onclick="irHoy()">HOY</button>
    <button type="button" aria-label="Semana anterior" onclick="cambiarSemana(-1)">‹</button>
    <div class="agenda-cabecera-info"><h1>Agenda</h1><span id="rango-semana"></span></div>
    <button type="button" aria-label="Semana siguiente" onclick="cambiarSemana(1)">›</button>
  </div>
  <div class="agenda-scroll"><div id="agenda-semanal" class="agenda-semanal"></div></div>
</div>

<nav class="nav-bottom">
  <a href="mi-perfil.html" class="nav-btn"><span>👤</span><span>Perfil</span></a>
  <a href="mi-rutina.html" class="nav-btn"><span>💪</span><span>Rutina</span></a>
  <a href="agenda.html" class="nav-btn activo"><span>📅</span><span>Agenda</span></a>
  <a href="mi-nutricion.html" class="nav-btn"><span>🥗</span><span>Nutrición</span></a>
  <a href="mi-progreso.html" class="nav-btn"><span>📈</span><span>Progreso</span></a>
  <a href="retos.html" class="nav-btn"><span>🏆</span><span>Retos</span></a>
  <button class="nav-btn" onclick="cerrarSesion()"><span>🚪</span><span>Salir</span></button>
</nav>

<script src="js/api.js"></script>
<script>
requireAuth();
const HORA_INICIO = 6;
const HORA_FIN = 22;
const DIAS = ["Lun", "Mar", "Mié", "Jue", "Vie", "Sáb", "Dom"];
let clases = [];
let agendaActiva = "";
let fechaBase = lunes(new Date());

function lunes(fecha) {
  const resultado = new Date(fecha);
  const numeroDia = resultado.getDay();
  resultado.setDate(resultado.getDate() + (numeroDia === 0 ? -6 : 1 - numeroDia));
  resultado.setHours(0, 0, 0, 0);
  return resultado;
}

function iso(fecha) {
  return new Date(fecha.getTime() - fecha.getTimezoneOffset() * 60000).toISOString().slice(0, 10);
}

function hora(valor) {
  const fecha = new Date(valor);
  return fecha.getHours() + fecha.getMinutes() / 60;
}

function hfmt(valor) {
  return new Date(valor).toLocaleTimeString("es-PE", { hour: "2-digit", minute: "2-digit" });
}

async function cargar() {
  const [agenda, salas] = await Promise.all([
    apiFetch("/portal-alumno/agenda"),
    apiFetch("/portal-alumno/salas"),
  ]);
  clases = Array.isArray(agenda) ? agenda : [];
  const nombres = (Array.isArray(salas) ? salas : []).map(sala => sala.nombre);
  if (!agendaActiva || !nombres.includes(agendaActiva)) agendaActiva = nombres[0] || "";
  document.getElementById("selector-sala").innerHTML = nombres.length
    ? nombres.map(nombre => `<option value="${nombre}" ${nombre === agendaActiva ? "selected" : ""}>${nombre}</option>`).join("")
    : `<option value="">Sin agendas</option>`;
  render();
}

function elegirAgenda(nombre) {
  agendaActiva = nombre;
  render();
}

function cambiarSemana(cantidad) {
  fechaBase.setDate(fechaBase.getDate() + cantidad * 7);
  render();
}

function irHoy() {
  fechaBase = lunes(new Date());
  render();
}

function render() {
  const fechas = Array.from({ length: 7 }, (_, indice) => {
    const fecha = new Date(fechaBase);
    fecha.setDate(fecha.getDate() + indice);
    return fecha;
  });
  const hoyIso = iso(new Date());
  const fechaInicioIso = iso(fechas[0]);
  const fechaFinIso = iso(fechas[6]);
  document.getElementById("rango-semana").textContent = `${fechas[0].toLocaleDateString("es-PE", { day: "numeric", month: "short" })} – ${fechas[6].toLocaleDateString("es-PE", { day: "numeric", month: "short", year: "numeric" })}`;

  const eventos = clases.filter(clase => clase.agenda === agendaActiva && clase.fecha >= fechaInicioIso && clase.fecha <= fechaFinIso);
  const porFecha = new Map(fechas.map(fecha => [iso(fecha), []]));
  eventos.forEach(clase => porFecha.get(clase.fecha)?.push(clase));
  const porDia = fechas.map(fecha => porFecha.get(iso(fecha)) || []);
  const ocupadas = new Set();
  eventos.forEach(clase => {
    for (let horaActual = Math.floor(hora(clase.hora_inicio)); horaActual < Math.ceil(clase.hora_fin ? hora(clase.hora_fin) : hora(clase.hora_inicio) + 1); horaActual++) ocupadas.add(horaActual);
  });

  const altos = [];
  for (let horaActual = HORA_INICIO; horaActual < HORA_FIN; horaActual++) altos.push(ocupadas.has(horaActual) ? 52 : 13);
  const offsets = [0];
  altos.forEach(alto => offsets.push(offsets.at(-1) + alto));
  const total = offsets.at(-1);
  const posicion = valor => {
    const limitada = Math.max(HORA_INICIO, Math.min(valor, HORA_FIN));
    const indice = Math.min(Math.floor(limitada) - HORA_INICIO, altos.length - 1);
    return offsets[indice] + (limitada - Math.floor(limitada)) * altos[indice];
  };
  const anchos = porDia.map(lista => lista.length ? 150 : 38);

  let html = `<div class="agenda-esquina"></div>` + fechas.map((fecha, indice) => {
    const esHoy = iso(fecha) === hoyIso;
    return `<div class="agenda-dia-head ${porDia[indice].length ? "" : "vacio"} ${esHoy ? "hoy" : ""}">${DIAS[indice]}<b>${fecha.getDate()}</b></div>`;
  }).join("") + `<div class="agenda-horas" style="height:${total}px">${altos.map((_, indice) => `<span style="top:${offsets[indice]}px">${HORA_INICIO + indice}:00</span>`).join("")}</div>`;

  porDia.forEach((lista, indiceDia) => {
    const lineas = altos.map((alto, indice) => `<i style="top:${offsets[indice]}px;height:${alto}px"></i>`).join("");
    const items = lista.map(clase => {
      const arriba = posicion(hora(clase.hora_inicio));
      const abajo = posicion(clase.hora_fin ? hora(clase.hora_fin) : hora(clase.hora_inicio) + 1);
      const alto = Math.max(abajo - arriba, 30);
      return `<div class="agenda-evento ${clase.inscrito ? "inscrito" : ""}" style="top:${arriba}px;height:${alto}px"><strong>${clase.nombre}</strong><small>${hfmt(clase.hora_inicio)}${clase.sala ? ` · ${clase.sala}` : ""}</small>${clase.permite_registro ? `<button onclick="inscribir(${clase.id},this)">${clase.inscrito ? "Inscrito ✓" : "Programar"}</button>` : ""}</div>`;
    }).join("");
    const esHoy = iso(fechas[indiceDia]) === hoyIso;
    html += `<div class="agenda-col ${lista.length ? "" : "vacia"} ${esHoy ? "hoy" : ""}" style="height:${total}px">${lineas}${items}</div>`;
  });

  const grilla = document.getElementById("agenda-semanal");
  grilla.style.gridTemplateColumns = `52px ${anchos.map(ancho => `${ancho}px`).join(" ")}`;
  grilla.style.minWidth = `${52 + anchos.reduce((totalAncho, ancho) => totalAncho + ancho, 0)}px`;
  grilla.innerHTML = html;
}

async function inscribir(id, boton) {
  boton.disabled = true;
  try {
    const resultado = await apiFetch(`/portal-alumno/agenda/${id}/inscripcion`, { method: "POST" });
    const clase = clases.find(item => item.id === id);
    if (clase) clase.inscrito = Boolean(resultado.inscrito);
    render();
  } catch (error) {
    alert(error.message);
    boton.disabled = false;
  }
}

escucharActualizacionesPortal(["/portal-alumno/agenda", "/portal-alumno/salas"], cargar);
cargar();
</script>
</body>
</html>
