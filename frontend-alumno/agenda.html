<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Agenda</title><link rel="stylesheet" href="css/styles.css"></head><body>
<div class="page agenda-page"><div class="agenda-selector"><label for="selector-sala">Sala</label><select id="selector-sala" onchange="elegirAgenda(this.value)"></select></div><div class="agenda-cabecera"><button onclick="cambiarSemana(-1)">‹</button><div><h1>Agenda</h1><span id="rango-semana"></span></div><button onclick="cambiarSemana(1)">›</button></div><div class="agenda-scroll"><div id="agenda-semanal" class="agenda-semanal"></div></div></div>
<nav class="nav-bottom"><a href="mi-perfil.html" class="nav-btn"><span>👤</span><span>Perfil</span></a><a href="mi-rutina.html" class="nav-btn"><span>💪</span><span>Rutina</span></a><a href="agenda.html" class="nav-btn activo"><span>📅</span><span>Agenda</span></a><a href="mi-nutricion.html" class="nav-btn"><span>🥗</span><span>Nutrición</span></a><a href="mi-progreso.html" class="nav-btn"><span>📈</span><span>Progreso</span></a><a href="retos.html" class="nav-btn"><span>🏆</span><span>Retos</span></a><button class="nav-btn" onclick="cerrarSesion()"><span>🚪</span><span>Salir</span></button></nav>
<script src="js/api.js"></script><script>
requireAuth();const HORA_INICIO=6,HORA_FIN=22,DIAS=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];let clases=[],agendaActiva='',fechaBase=lunes(new Date());
function lunes(f){const d=new Date(f);const n=d.getDay();d.setDate(d.getDate()+(n===0?-6:1-n));d.setHours(0,0,0,0);return d}function iso(d){return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10)}function hora(x){const d=new Date(x);return d.getHours()+d.getMinutes()/60}function hfmt(x){return new Date(x).toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'})}
async function cargar(){const datos=await Promise.all([apiFetch('/portal-alumno/agenda'),apiFetch('/portal-alumno/salas')]);clases=datos[0];const nombres=datos[1].map(s=>s.nombre);if(!agendaActiva||!nombres.includes(agendaActiva))agendaActiva=nombres[0]||'';document.getElementById('selector-sala').innerHTML=nombres.length?nombres.map(n=>`<option value="${n}" ${n===agendaActiva?'selected':''}>${n}</option>`).join(''):'<option value="">Sin salas</option>';render()}
function elegirAgenda(n){agendaActiva=n;render()}function cambiarSemana(n){fechaBase.setDate(fechaBase.getDate()+n*7);render()}
function render(){const fechas=Array.from({length:7},(_,i)=>{const d=new Date(fechaBase);d.setDate(d.getDate()+i);return d});const fin=fechas[6];document.getElementById('rango-semana').textContent=`${fechas[0].toLocaleDateString('es-PE',{day:'numeric',month:'short'})} – ${fin.toLocaleDateString('es-PE',{day:'numeric',month:'short',year:'numeric'})}`;const eventos=clases.filter(c=>c.agenda===agendaActiva&&c.fecha>=iso(fechas[0])&&c.fecha<=iso(fin));const porDia=fechas.map(d=>eventos.filter(c=>c.fecha===iso(d)));const ocupadas=new Set();eventos.forEach(c=>{for(let h=Math.floor(hora(c.hora_inicio));h<Math.ceil(c.hora_fin?hora(c.hora_fin):hora(c.hora_inicio)+1);h++)ocupadas.add(h)});const altos=[];for(let h=HORA_INICIO;h<HORA_FIN;h++)altos.push(ocupadas.has(h)?52:13);const offsets=[0];altos.forEach(x=>offsets.push(offsets.at(-1)+x));const total=offsets.at(-1);const pos=v=>{v=Math.max(HORA_INICIO,Math.min(v,HORA_FIN));const i=Math.min(Math.floor(v)-HORA_INICIO,altos.length-1);return offsets[i]+(v-Math.floor(v))*altos[i]};const anchos=porDia.map(x=>x.length?150:38);let html=`<div class="agenda-esquina"></div>`+fechas.map((d,i)=>`<div class="agenda-dia-head ${porDia[i].length?'':'vacio'}">${DIAS[i]}<b>${d.getDate()}</b></div>`).join('')+`<div class="agenda-horas" style="height:${total}px">${altos.map((_,i)=>`<span style="top:${offsets[i]}px">${HORA_INICIO+i}:00</span>`).join('')}</div>`;porDia.forEach((lista,i)=>{const lineas=altos.map((a,j)=>`<i style="top:${offsets[j]}px;height:${a}px"></i>`).join('');const items=lista.map(c=>{const top=pos(hora(c.hora_inicio)),bottom=pos(c.hora_fin?hora(c.hora_fin):hora(c.hora_inicio)+1),alto=Math.max(bottom-top,30);return `<div class="agenda-evento ${c.inscrito?'inscrito':''}" style="top:${top}px;height:${alto}px"><strong>${c.nombre}</strong><small>${hfmt(c.hora_inicio)}${c.sala?' · '+c.sala:''}</small>${c.permite_registro?`<button onclick="inscribir(${c.id})">${c.inscrito?'Inscrito ✓':'Programar'}</button>`:''}</div>`}).join('');html+=`<div class="agenda-col ${lista.length?'':'vacia'}" style="height:${total}px">${lineas}${items}</div>`});const grid=document.getElementById('agenda-semanal');grid.style.gridTemplateColumns=`52px ${anchos.map(x=>x+'px').join(' ')}`;grid.style.minWidth=(52+anchos.reduce((a,b)=>a+b,0))+'px';grid.innerHTML=html}
async function inscribir(id){await apiFetch(`/portal-alumno/agenda/${id}/inscripcion`,{method:'POST'});await cargar()}cargar();
</script></body></html>
