<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soft-MrGym - Acceso Alumno</title>
    <link rel="stylesheet" href="css/styles.css">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <div class="icono">🏋️</div>
            <h1>Soft-MrGym</h1>
            <p>Portal del alumno</p>
        </div>
        <div id="alert-container"></div>
        <form id="form-login">
            <div class="form-group">
                <label>DNI</label>
                <input type="text" id="dni" placeholder="12345678" required autofocus inputmode="numeric">
            </div>
            <div class="form-group">
                <label>Codigo de acceso</label>
                <input type="password" id="codigo" placeholder="••••" required inputmode="numeric" maxlength="6">
            </div>
            <button type="submit" class="btn-login" id="btn">Ingresar</button>
        </form>
    </div>
    <script src="js/api.js"></script>
    <script>
        if (getToken()) window.location.href = "mi-rutina.html";

        /* Personalizar login con nombre del gym si viene ?gym=slug */
        (async () => {
            const info = await fetchInfoGym();
            if (info && info.nombre) {
                document.querySelector(".login-logo h1").textContent = info.nombre;
                document.querySelector(".login-logo p").textContent = "Portal del Socio";
                document.title = `${info.nombre} - Acceso Socio`;
            }
            /* PWA: inyectar manifest y registrar service worker */
            const slug = getSlug();
            if (slug) {
                const link = document.createElement("link");
                link.rel = "manifest";
                link.href = `${API_BASE}/gym/${slug}/manifest.json?portal=alumno`;
                document.head.appendChild(link);
                const iconLink = document.createElement("link");
                iconLink.rel = "icon";
                iconLink.href = `${API_BASE}/gym/${slug}/icon.svg`;
                iconLink.type = "image/svg+xml";
                document.head.appendChild(iconLink);
                const appleIcon = document.createElement("link");
                appleIcon.rel = "apple-touch-icon";
                appleIcon.href = `${API_BASE}/gym/${slug}/icon.svg`;
                document.head.appendChild(appleIcon);
                if ("serviceWorker" in navigator) {
                    navigator.serviceWorker.register(`${API_BASE}/gym/${slug}/sw.js`).catch(() => {});
                }
            }
        })();
        document.getElementById("form-login").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btn");
            btn.disabled = true;
            btn.textContent = "Ingresando...";
            document.getElementById("alert-container").innerHTML = "";
            try {
                await loginAlumno(
                    document.getElementById("dni").value.trim(),
                    document.getElementById("codigo").value.trim()
                );
                window.location.href = "mi-rutina.html";
            } catch (err) {
                document.getElementById("alert-container").innerHTML =
                    `<div class="alert alert-error">${err.message}</div>`;
                btn.disabled = false;
                btn.textContent = "Ingresar";
            }
        });
    </script>
</body>
</html>
