<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soft-Gym - Acceso Alumno</title>
    <link rel="stylesheet" href="css/styles.css">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <div class="icono">🏋️</div>
            <h1>Soft-Gym</h1>
            <p>Portal del alumno</p>
        </div>
        <div id="alert-container"></div>
        <form id="form-login">
            <div class="form-group">
                <label>DNI</label>
                <input type="text" id="dni" placeholder="12345678" required autofocus inputmode="numeric">
            </div>
            <div class="form-group" id="grupo-codigo" style="display:none;">
                <label>Contraseña</label>
                <input type="password" id="codigo" placeholder="••••••" inputmode="numeric" maxlength="12">
            </div>
            <button type="submit" class="btn-login" id="btn">Continuar</button>
        </form>
    </div>
    <div id="modal-cambiar-password" class="password-modal" aria-modal="true" role="dialog">
        <div class="password-modal-card">
            <h2>Crear contraseña de 6 a 12 números</h2>
            <p>Crea una contraseña personal para ingresar a tu portal.</p>
            <div id="password-alert"></div>
            <div class="form-group">
                <label>Crea tu contraseña</label>
                <input type="password" id="nueva-password" inputmode="numeric" maxlength="12" placeholder="6 a 12 números">
            </div>
            <div class="form-group">
                <label>Repite la contraseña</label>
                <input type="password" id="confirmar-password" inputmode="numeric" maxlength="12" placeholder="Repite la contraseña">
            </div>
            <button type="button" class="btn-login" id="btn-cambiar-password" onclick="confirmarCambioPassword()">Guardar e ingresar</button>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script>
        function mostrarCambioPassword() {
            document.getElementById("modal-cambiar-password").classList.add("active");
            setTimeout(() => document.getElementById("nueva-password").focus(), 50);
        }

        async function confirmarCambioPassword() {
            const nueva = document.getElementById("nueva-password").value.trim();
            const confirmar = document.getElementById("confirmar-password").value.trim();
            const alert = document.getElementById("password-alert");
            if (!/^\d{6,12}$/.test(nueva)) {
                alert.innerHTML = '<div class="alert alert-error">Usa entre 6 y 12 números.</div>';
                return;
            }
            if (nueva !== confirmar) {
                alert.innerHTML = '<div class="alert alert-error">Las contraseñas no coinciden.</div>';
                return;
            }
            const btn = document.getElementById("btn-cambiar-password");
            btn.disabled = true;
            btn.textContent = "Guardando...";
            try {
                await cambiarPasswordAlumno(nueva);
                window.location.href = "mi-perfil.html";
            } catch (err) {
                alert.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
                btn.disabled = false;
                btn.textContent = "Guardar e ingresar";
            }
        }

        if (getToken()) {
            if (debeCambiarPassword()) mostrarCambioPassword();
            else window.location.href = "mi-perfil.html";
        }

        /* Personalizar login con nombre del gym si viene ?gym=slug */
        (async () => {
            const info = await fetchInfoGym();
            if (info && info.nombre) {
                document.querySelector(".login-logo h1").textContent = info.nombre;
                document.querySelector(".login-logo p").textContent = "Portal del Socio";
                document.title = `${info.nombre} - Acceso Socio`;
            }
            /* PWA: inyectar manifest y registrar service worker */
            const slug = getSlug();
            if (slug) {
                const link = document.createElement("link");
                link.rel = "manifest";
                link.href = `${API_BASE}/gym/${slug}/manifest.json?portal=alumno`;
                document.head.appendChild(link);
                const iconLink = document.createElement("link");
                iconLink.rel = "icon";
                iconLink.href = `${API_BASE}/gym/${slug}/icon.svg`;
                iconLink.type = "image/svg+xml";
                document.head.appendChild(iconLink);
                const appleIcon = document.createElement("link");
                appleIcon.rel = "apple-touch-icon";
                appleIcon.href = `${API_BASE}/gym/${slug}/icon.svg`;
                document.head.appendChild(appleIcon);
                if ("serviceWorker" in navigator) {
                    navigator.serviceWorker.register(`${API_BASE}/gym/${slug}/sw.js`).catch(() => {});
                }
            }
        })();
        let esperandoPassword = false;
        document.getElementById("form-login").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btn");
            btn.disabled = true;
            btn.textContent = esperandoPassword ? "Ingresando..." : "Comprobando...";
            document.getElementById("alert-container").innerHTML = "";
            try {
                const dni = document.getElementById("dni").value.trim();
                if (!esperandoPassword) {
                    const inicio = await iniciarLoginAlumno(dni);
                    if (inicio.debe_crear_password) {
                        btn.disabled = false;
                        btn.textContent = "Continuar";
                        mostrarCambioPassword();
                        return;
                    }
                    esperandoPassword = true;
                    document.getElementById("grupo-codigo").style.display = "block";
                    document.getElementById("dni").readOnly = true;
                    btn.disabled = false;
                    btn.textContent = "Ingresar";
                    document.getElementById("codigo").focus();
                    return;
                }
                const sesion = await loginAlumno(dni, document.getElementById("codigo").value.trim());
                if (sesion.debe_cambiar_password) {
                    btn.disabled = false;
                    btn.textContent = "Continuar";
                    mostrarCambioPassword();
                } else {
                    window.location.href = "mi-perfil.html";
                }
            } catch (err) {
                document.getElementById("alert-container").innerHTML =
                    `<div class="alert alert-error">${err.message}</div>`;
                btn.disabled = false;
                btn.textContent = esperandoPassword ? "Ingresar" : "Continuar";
            }
        });
    </script>
</body>
</html>
