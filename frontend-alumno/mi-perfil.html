<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Portal del Socio</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="page perfil-page">
  <div class="portal-topbar">
    <div id="logo-gimnasio" class="logo-gimnasio"></div>
    <button id="theme-switch" class="theme-switch" type="button" aria-label="Cambiar tema" onclick="cambiarTema()"><span></span></button>
  </div>
  <div id="contenido"><p class="estado-cargando">Cargando...</p></div>
</div>

<div id="modal-camara" class="camara-modal" role="dialog" aria-modal="true" aria-labelledby="titulo-camara">
  <div class="camara-card" onclick="event.stopPropagation()">
    <div class="camara-header">
      <strong id="titulo-camara">Tomar foto</strong>
      <div class="camara-acciones">
        <button id="boton-cambiar-camara" class="camara-cambiar" type="button" onclick="cambiarCamara(event)">Cámara frontal</button>
        <button type="button" aria-label="Cerrar cámara" onclick="cerrarCamara()">✕</button>
      </div>
    </div>
    <div class="camara-vista">
      <video id="video-camara" autoplay muted playsinline></video>
      <img id="previsualizacion-camara" alt="Foto capturada">
      <p id="camara-estado">Abriendo cámara...</p>
    </div>
    <button id="boton-capturar" class="camara-capturar" type="button" onclick="capturarFoto()" disabled><span></span><b>Tomar foto</b></button>
    <div id="camara-confirmacion" class="camara-confirmacion">
      <button class="camara-repetir" type="button" onclick="volverATomarFoto()">Volver a tomar</button>
      <button class="camara-confirmar" type="button" onclick="confirmarFoto()">Confirmar foto</button>
    </div>
  </div>
</div>

<nav class="nav-bottom">
  <a href="mi-perfil.html" class="nav-btn activo"><span>👤</span><span>Perfil</span></a>
  <a href="mi-rutina.html" class="nav-btn"><span>💪</span><span>Rutina</span></a>
  <a href="agenda.html" class="nav-btn"><span>📅</span><span>Agenda</span></a>
  <a href="mi-nutricion.html" class="nav-btn"><span>🥗</span><span>Nutrición</span></a>
  <a href="mi-progreso.html" class="nav-btn"><span>📈</span><span>Progreso</span></a>
  <a href="retos.html" class="nav-btn"><span>🏆</span><span>Retos</span></a>
  <button class="nav-btn" onclick="cerrarSesion()"><span>🚪</span><span>Salir</span></button>
</nav>

<script src="js/api.js"></script>
<script>
requireAuth();
let resumenActual = null;
let flujoCamara = null;
let modoCamara = "environment";
let fotoCamaraPendiente = null;
let urlFotoCamaraPendiente = null;

function cambiarTema() {
  alternarTemaPortal();
  actualizarSwitchTema();
  actualizarLogoTema();
}

function actualizarSwitchTema() {
  document.getElementById("theme-switch").classList.toggle("activo", document.documentElement.dataset.tema === "oscuro");
}

function actualizarLogoTema() {
  if (!resumenActual?.gimnasio) return;
  const g = resumenActual.gimnasio;
  const usaOscuro = document.documentElement.dataset.tema === "oscuro" && g.logo_oscuro_url;
  const rutaBase = usaOscuro ? g.logo_oscuro_url : g.logo_url;
  const version = usaOscuro ? g.logo_oscuro_version : g.logo_version;
  const ruta = rutaBase ? `${rutaBase}${version ? `?v=${encodeURIComponent(version)}` : ""}` : null;
  document.getElementById("logo-gimnasio").innerHTML = ruta ? `<img src="${urlFoto(ruta)}" alt="${escapeHTML(g.nombre)}">` : `<strong>${escapeHTML(g.nombre)}</strong>`;
}

function dinero(valor) {
  return `S/ ${Number(valor || 0).toFixed(2)}`;
}

async function cargar() {
  resumenActual = await _apiFetchRed("/portal-alumno/resumen", { cache: "no-store", _silencioso: true });
  _guardarCachePortal("/portal-alumno/resumen", resumenActual, false);
  const perfil = resumenActual.perfil;
  const nombre = `${perfil.nombre} ${perfil.apellidos || ""}`.trim();
  const avatar = perfil.foto_url
    ? `<img src="${urlFoto(perfil.foto_url)}" alt="Foto de ${nombre}" onerror="this.onerror=null;this.src='alumno-generico.svg'">`
    : `<img src="alumno-generico.svg" alt="Imagen genérica de alumno">`;
  const plan = resumenActual.plan;
  const planHtml = plan
    ? `<div class="plan-filas"><div><span>Plan</span><strong>${escapeHTML(plan.nombre)}</strong></div><div><span>Inicio</span><strong>${escapeHTML(formatFecha(plan.inicio))}</strong></div><div><span>Fin</span><strong>${escapeHTML(formatFecha(plan.fin))}</strong></div><div><span>Precio</span><strong>${dinero(plan.precio)}</strong></div><div><span>Pagado</span><strong>${dinero(plan.pagado)}</strong></div><div><span>Saldo</span><strong class="${plan.saldo > 0 ? "saldo-pendiente" : ""}">${dinero(plan.saldo)}</strong></div></div>${plan.saldo > 0 ? `<button class="btn-pagar" disabled>Pago en línea próximamente</button>` : ""}`
    : `<div class="vacio-plan">No tienes un plan activo.</div>`;

  actualizarLogoTema();
  document.getElementById("contenido").innerHTML = `<section class="perfil-identidad"><div class="avatar-grande" id="avatar-wrap">${avatar}<button class="boton-camara" aria-label="Cambiar foto" onclick="alternarMenuFoto(event)">📷</button><div class="menu-foto" id="menu-foto"><label>Galería<input type="file" accept="image/*" style="display:none" onchange="subirFoto(this)"></label><button type="button" onclick="abrirCamara(event)">Tomar foto</button></div></div><div class="perfil-linea"><strong>${escapeHTML(nombre)}</strong><span>${escapeHTML(perfil.telefono || "Sin celular")}</span></div></section><section class="card plan-card"><div class="card-header">Mi plan actual</div><div class="card-body">${planHtml}</div></section>`;
}

function alternarMenuFoto(event) {
  event.stopPropagation();
  document.getElementById("menu-foto").classList.toggle("activo");
}

document.addEventListener("click", () => document.getElementById("menu-foto")?.classList.remove("activo"));

async function subirFoto(input) {
  const archivo = input.files && input.files[0];
  if (!archivo) return;
  try {
    await apiUploadFile("/portal-alumno/mi-foto", archivo);
    await cargar();
  } catch (error) {
    alert(error.message);
  } finally {
    input.value = "";
  }
}

async function abrirCamara(event) {
  event?.stopPropagation();
  document.getElementById("menu-foto")?.classList.remove("activo");
  limpiarFotoCamaraPendiente();
  const modal = document.getElementById("modal-camara");
  const estado = document.getElementById("camara-estado");
  const boton = document.getElementById("boton-capturar");
  document.getElementById("titulo-camara").textContent = "Tomar foto";
  document.getElementById("video-camara").style.display = "block";
  document.getElementById("previsualizacion-camara").style.display = "none";
  document.getElementById("camara-confirmacion").style.display = "none";
  document.getElementById("boton-cambiar-camara").style.display = "inline-block";
  boton.style.display = "flex";
  modal.classList.add("activo");
  estado.textContent = "Abriendo cámara...";
  estado.style.display = "block";
  boton.disabled = true;

  if (!navigator.mediaDevices?.getUserMedia) {
    estado.textContent = "Este navegador no permite abrir la cámara. Usa la opción Galería.";
    return;
  }

  await iniciarCamara();
}

async function iniciarCamara() {
  const video = document.getElementById("video-camara");
  const estado = document.getElementById("camara-estado");
  const boton = document.getElementById("boton-capturar");
  const cambiar = document.getElementById("boton-cambiar-camara");
  liberarCamara();
  estado.textContent = "Abriendo cámara...";
  estado.style.display = "block";
  boton.disabled = true;
  cambiar.disabled = true;

  try {
    flujoCamara = await navigator.mediaDevices.getUserMedia({
      audio: false,
      video: {
        facingMode: { ideal: modoCamara },
        width: { ideal: 960, max: 1280 },
        height: { ideal: 960, max: 1280 },
      },
    });
    video.srcObject = flujoCamara;
    await video.play();
    estado.style.display = "none";
    boton.disabled = false;
    cambiar.disabled = false;
    cambiar.textContent = modoCamara === "environment" ? "Cámara frontal" : "Cámara trasera";
  } catch (error) {
    estado.textContent = error?.name === "NotAllowedError"
      ? "Activa el permiso de cámara para tomar la foto."
      : "No se pudo abrir la cámara. Usa la opción Galería.";
    cambiar.disabled = false;
  }
}

async function cambiarCamara(event) {
  event?.stopPropagation();
  modoCamara = modoCamara === "environment" ? "user" : "environment";
  await iniciarCamara();
}

function liberarCamara() {
  if (flujoCamara) {
    flujoCamara.getTracks().forEach(track => track.stop());
    flujoCamara = null;
  }
  const video = document.getElementById("video-camara");
  if (video) video.srcObject = null;
}

function cerrarCamara() {
  liberarCamara();
  limpiarFotoCamaraPendiente();
  document.getElementById("modal-camara").classList.remove("activo");
}

function limpiarFotoCamaraPendiente() {
  if (urlFotoCamaraPendiente) URL.revokeObjectURL(urlFotoCamaraPendiente);
  urlFotoCamaraPendiente = null;
  fotoCamaraPendiente = null;
  const preview = document.getElementById("previsualizacion-camara");
  if (preview) {
    preview.removeAttribute("src");
    preview.style.display = "none";
  }
}

async function capturarFoto() {
  const video = document.getElementById("video-camara");
  const boton = document.getElementById("boton-capturar");
  const textoBoton = boton.querySelector("b");
  if (!video.videoWidth || !video.videoHeight) return;
  boton.disabled = true;
  textoBoton.textContent = "Procesando...";

  try {
    const maximo = 960;
    const ladoOrigen = Math.min(video.videoWidth, video.videoHeight);
    const inicioX = (video.videoWidth - ladoOrigen) / 2;
    const inicioY = (video.videoHeight - ladoOrigen) / 2;
    const ladoDestino = Math.min(maximo, ladoOrigen);
    const canvas = document.createElement("canvas");
    canvas.width = canvas.height = Math.max(1, Math.round(ladoDestino));
    canvas.getContext("2d", { alpha: false }).drawImage(video, inicioX, inicioY, ladoOrigen, ladoOrigen, 0, 0, canvas.width, canvas.height);

    const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/webp", 0.72));
    canvas.width = canvas.height = 1;
    if (!blob) throw new Error("No se pudo procesar la foto");

    const extension = blob.type === "image/webp" ? "webp" : "jpg";
    fotoCamaraPendiente = new File([blob], `foto-camara.${extension}`, { type: blob.type || "image/jpeg" });
    urlFotoCamaraPendiente = URL.createObjectURL(blob);
    const preview = document.getElementById("previsualizacion-camara");
    preview.src = urlFotoCamaraPendiente;
    try { await preview.decode(); } catch (_) {}
    preview.style.display = "block";
    video.style.display = "none";
    document.getElementById("camara-estado").style.display = "none";
    document.getElementById("boton-cambiar-camara").style.display = "none";
    boton.style.display = "none";
    document.getElementById("camara-confirmacion").style.display = "flex";
    document.getElementById("titulo-camara").textContent = "Revisar foto";
    liberarCamara();
  } catch (error) {
    alert(error.message || "No se pudo tomar la foto");
  } finally {
    textoBoton.textContent = "Tomar foto";
    boton.disabled = false;
  }
}

async function volverATomarFoto() {
  limpiarFotoCamaraPendiente();
  document.getElementById("titulo-camara").textContent = "Tomar foto";
  document.getElementById("previsualizacion-camara").style.display = "none";
  document.getElementById("video-camara").style.display = "block";
  document.getElementById("camara-confirmacion").style.display = "none";
  document.getElementById("boton-capturar").style.display = "flex";
  document.getElementById("boton-cambiar-camara").style.display = "inline-block";
  await iniciarCamara();
}

async function confirmarFoto() {
  if (!fotoCamaraPendiente) return;
  const botones = document.querySelectorAll("#camara-confirmacion button");
  botones.forEach(boton => boton.disabled = true);
  try {
    await apiUploadFile("/portal-alumno/mi-foto", fotoCamaraPendiente);
    cerrarCamara();
    await cargar();
  } catch (error) {
    alert(error.message || "No se pudo guardar la foto");
  } finally {
    botones.forEach(boton => boton.disabled = false);
  }
}

document.getElementById("modal-camara").addEventListener("click", cerrarCamara);
window.addEventListener("pagehide", liberarCamara);
actualizarSwitchTema();
escucharActualizacionesPortal(["/portal-alumno/resumen"], cargar);
cargar();
</script>
</body>
</html>
