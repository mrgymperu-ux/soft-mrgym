<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mi Rutina</title><link rel="stylesheet" href="css/styles.css"></head><body>
<div class="page"><div class="fecha-rutina" id="fecha-hoy"></div><div id="aviso-asistencia"></div><div id="contenido" class="estado-cargando">Cargando...</div></div>
<nav class="nav-bottom"><a href="mi-perfil.html" class="nav-btn"><span>👤</span><span>Perfil</span></a><a href="mi-rutina.html" class="nav-btn activo"><span>💪</span><span>Rutina</span></a><a href="agenda.html" class="nav-btn"><span>📅</span><span>Agenda</span></a><a href="mi-nutricion.html" class="nav-btn"><span>🥗</span><span>Nutrición</span></a><a href="mi-progreso.html" class="nav-btn"><span>📈</span><span>Progreso</span></a><a href="retos.html" class="nav-btn"><span>🏆</span><span>Retos</span></a><button class="nav-btn" onclick="cerrarSesion()"><span>🚪</span><span>Salir</span></button></nav>
<script src="js/api.js"></script><script>
requireAuth();let dias=[],completados=new Set(),habilitado=false;document.getElementById('fecha-hoy').textContent=new Intl.DateTimeFormat('es-PE',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).format(new Date()).replace(/^./,x=>x.toUpperCase());
async function cargar(){const [resumen,rutinas,hechos]=await Promise.all([apiFetch('/portal-alumno/resumen'),apiFetch('/portal-alumno/mi-rutina'),apiFetch('/portal-alumno/ejercicios-completados')]);habilitado=resumen.asistencia_hoy;completados=new Set(hechos.ejercicios||[]);const aviso=document.getElementById('aviso-asistencia');if(habilitado){aviso.innerHTML='<div class="asistencia-confirmada">✓ Asistencia marcada. Ya puedes completar tus ejercicios.</div>'}else if(resumen.asistencia_ubicacion_configurada){aviso.innerHTML='<div class="aviso-asistencia"><strong>Puedes revisar toda tu rutina.</strong><span>Para marcar ejercicios debes registrar tu asistencia dentro del gimnasio.</span><button class="btn-marcar-asistencia" type="button" onclick="marcarMiAsistencia(this)">Comprobar ubicación y marcar asistencia</button></div>'}else{aviso.innerHTML='<div class="aviso-asistencia"><strong>Puedes revisar toda tu rutina.</strong><span>Para marcar ejercicios solicita tu asistencia en Counter.</span></div>'}if(!rutinas.length){document.getElementById('contenido').innerHTML='<div class="vacio-plan">Aún no tienes una rutina asignada.</div>';return}dias=rutinas[0].dias||[];document.getElementById('contenido').innerHTML=`<div class="rutina-panel"><div class="dias-nav">${dias.map((d,i)=>`<button class="dia-pill ${i===0?'activo':''}" onclick="cambiarDia(${i},this)">Día ${i+1}</button>`).join('')}</div><div id="ejercicios-content"></div></div>`;renderDia(dias[0])}
function cambiarDia(i,el){document.querySelectorAll('.dia-pill').forEach(x=>x.classList.remove('activo'));el.classList.add('activo');renderDia(dias[i])}function renderDia(dia){const lista=dia?.ejercicios||[];document.getElementById('ejercicios-content').innerHTML=lista.map(e=>`<label class="ejercicio-fila ${completados.has(e.id)?'completado':''}"><input type="checkbox" ${completados.has(e.id)?'checked':''} ${habilitado?'':'disabled'} onchange="marcar(${e.id},this)"><span class="ejercicio-info"><strong>${e.nombre}</strong><small>${e.series?e.series+' series':''}${e.repeticiones?' · '+e.repeticiones+' reps':''}${e.peso?' · '+e.peso:''}</small>${e.notas?`<em>${e.notas}</em>`:''}</span></label>`).join('')||'<div class="vacio-plan">Sin ejercicios para este día.</div>'}async function marcar(id,input){try{const r=await apiFetch(`/portal-alumno/ejercicios/${id}/completar`,{method:'POST'});r.completado?completados.add(id):completados.delete(id);input.closest('.ejercicio-fila').classList.toggle('completado',r.completado)}catch(e){input.checked=!input.checked;alert(e.message)}}cargar();
async function marcarMiAsistencia(boton){if(!navigator.geolocation){alert('Este celular no permite comprobar tu ubicación. Solicita ayuda en Counter.');return}boton.disabled=true;boton.textContent='Comprobando ubicación...';try{const posicion=await new Promise((resolve,reject)=>navigator.geolocation.getCurrentPosition(resolve,reject,{enableHighAccuracy:true,timeout:15000,maximumAge:0}));const resultado=await apiFetch('/portal-alumno/marcar-asistencia',{method:'POST',body:JSON.stringify({latitud:posicion.coords.latitude,longitud:posicion.coords.longitude,precision_metros:posicion.coords.accuracy})});invalidarCachePortal();alert(resultado.mensaje||'Asistencia registrada');await cargar()}catch(error){const mensaje=error?.code===1?'Permite el acceso a la ubicación para marcar tu asistencia.':error?.code===2?'No se pudo obtener tu ubicación. Activa el GPS e intenta nuevamente.':error?.code===3?'La ubicación tardó demasiado. Intenta nuevamente.':error.message;alert(mensaje||'No se pudo marcar la asistencia');boton.disabled=false;boton.textContent='Marcar mi asistencia'}}
// Reemplaza la lectura unica anterior: espera la mejor medicion que entregue el GPS.
async function marcarMiAsistencia(boton){
    if(!navigator.geolocation){alert('Este celular no permite comprobar tu ubicación. Solicita ayuda en Counter.');return}
    boton.disabled=true;
    boton.textContent='Buscando ubicación precisa...';
    try{
        const posicion=await obtenerUbicacionPrecisa({tiempoMaximo:25000,precisionObjetivo:80});
        const resultado=await apiFetch('/portal-alumno/marcar-asistencia',{method:'POST',body:JSON.stringify({latitud:posicion.coords.latitude,longitud:posicion.coords.longitude,precision_metros:posicion.coords.accuracy})});
        invalidarCachePortal();
        alert(resultado.mensaje||'Asistencia registrada');
        await cargar();
    }catch(error){
        const mensaje=error?.code===1?'Permite el acceso a la ubicación precisa para marcar tu asistencia.':error?.code===2?'No se pudo obtener tu ubicación. Activa el GPS e intenta nuevamente.':error?.code===3?'La ubicación tardó demasiado. Acércate a una ventana e intenta nuevamente.':error.message;
        alert(mensaje||'No se pudo marcar la asistencia');
        boton.disabled=false;
        boton.textContent='Comprobar ubicación y marcar asistencia';
    }
}
escucharActualizacionesPortal(['/portal-alumno/resumen','/portal-alumno/mi-rutina','/portal-alumno/ejercicios-completados'],cargar);
</script></body></html>
