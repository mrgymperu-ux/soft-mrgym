<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aceptar invitación - Soft-Gym</title><link rel="stylesheet" href="css/styles.css"></head>
<body class="login-page"><main class="login-card"><h1>Crear cuenta de trabajador</h1>
<div class="form-group"><label>Nombre completo</label><input id="nombre"></div>
<div class="form-group"><label>Usuario</label><input id="username"></div>
<div class="form-group"><label>Contraseña</label><input id="password" type="password" minlength="10" placeholder="Mínimo 10 caracteres, letras y números"></div>
<button class="btn btn-primary" id="aceptar">Crear mi cuenta</button><div id="mensaje"></div></main>
<script src="js/api.js"></script><script>const token=new URLSearchParams(location.search).get("token")||"";document.getElementById("aceptar").onclick=async()=>{const m=document.getElementById("mensaje");try{const r=await fetch(`${API_BASE_URL}/auth/aceptar-invitacion`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,nombre_completo:document.getElementById("nombre").value.trim(),username:document.getElementById("username").value.trim(),password:document.getElementById("password").value})});const d=await r.json();if(!r.ok)throw new Error(d.detail||"No se pudo crear la cuenta");m.innerHTML='Cuenta creada. <a href="login.html">Iniciar sesión</a>';document.getElementById("aceptar").disabled=true}catch(e){m.textContent=e.message}};</script></body></html>
