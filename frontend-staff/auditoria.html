<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Auditoría - Soft-Gym</title><link rel="stylesheet" href="css/styles.css"><script src="js/tema.js"></script></head>
<body><div class="app-layout"><div id="sidebar-container"></div><main class="main-content"><div class="header"><div><h1 class="header-title">Auditoría</h1><p class="header-subtitle">Historial de operaciones sensibles del gimnasio</p></div></div>
<div class="card"><div style="display:flex;gap:10px;padding:16px;flex-wrap:wrap"><select id="accion"><option value="">Todas las acciones</option><option>POST</option><option>PUT</option><option>PATCH</option><option>DELETE</option><option>EXPORTAR</option><option>INICIO_SESION</option></select><input id="desde" type="date"><input id="hasta" type="date"><button class="btn btn-primary" onclick="cargar()">Filtrar</button></div>
<div class="table-container"><table class="table"><thead><tr><th>Fecha</th><th>Usuario</th><th>Acción</th><th>Recurso</th><th>Resultado</th><th>IP</th></tr></thead><tbody id="filas"><tr><td colspan="6">Cargando…</td></tr></tbody></table></div></div></main></div>
<script src="js/api.js"></script><script src="js/sidebar.js"></script><script>
async function cargar(){const q=new URLSearchParams();for(const id of ["accion","desde","hasta"]){const v=document.getElementById(id).value;if(v)q.set(id,v)}try{const datos=await apiFetch(`/auditoria?${q}`);document.getElementById("filas").innerHTML=datos.length?datos.map(e=>`<tr><td>${escapeHTML(formatFechaHora(e.creado_en))}</td><td>${escapeHTML(e.usuario)}</td><td>${escapeHTML(e.accion)}</td><td>${escapeHTML(e.ruta||"")}</td><td>${Number(e.estado_http)||""}</td><td>${escapeHTML(e.ip||"")}</td></tr>`).join(""):'<tr><td colspan="6">Sin eventos</td></tr>'}catch(e){showError(e.message)}}cargar();
</script></body></html>
