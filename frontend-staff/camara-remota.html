<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <title>Cámara remota Soft-Gym</title>
    <style>
        *{box-sizing:border-box}body{margin:0;background:#080b0a;color:#fff;font-family:system-ui,sans-serif;overflow:hidden}
        video{width:100vw;height:100dvh;object-fit:cover;transform:scaleX(-1)}
        #estado{position:fixed;left:16px;right:16px;bottom:max(20px,env(safe-area-inset-bottom));padding:14px;border-radius:12px;background:rgba(0,0,0,.66);text-align:center;font-weight:650;backdrop-filter:blur(8px)}
        #resultado{display:none;position:fixed;inset:0;background:rgba(13,155,86,.9);align-items:center;justify-content:center;text-align:center;font-size:clamp(1.6rem,8vw,3rem);font-weight:800;padding:30px}
        #iniciar{position:fixed;inset:0;margin:auto;width:min(86vw,360px);height:58px;border:0;border-radius:14px;background:#23c875;color:#062d1b;font-size:1.05rem;font-weight:800}
    </style>
</head>
<body>
<video id="video" playsinline muted></video>
<button id="iniciar">Activar cámara frontal</button>
<div id="estado">Pulsa para conectar esta cámara al counter</div>
<div id="resultado"></div>
<script>
const token=new URLSearchParams(location.search).get('token');
const video=document.getElementById('video'),estado=document.getElementById('estado'),boton=document.getElementById('iniciar'),resultado=document.getElementById('resultado');
let ws,pc,stream;
const enviar=(dato)=>ws&&ws.readyState===1&&ws.send(JSON.stringify(dato));
async function conectar(){
 if(!token){estado.textContent='Enlace inválido o vencido';return}
 boton.style.display='none';
 try{
  stream=await navigator.mediaDevices.getUserMedia({audio:false,video:{facingMode:{ideal:'user'},width:{ideal:1280},height:{ideal:720}}});video.srcObject=stream;await video.play();
  pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});stream.getTracks().forEach(t=>pc.addTrack(t,stream));
  pc.onicecandidate=e=>e.candidate&&enviar({tipo:'candidate',candidate:e.candidate});
  pc.onconnectionstatechange=()=>{estado.textContent=pc.connectionState==='connected'?'Cámara conectada · mira al frente':'Conectando con el counter…'};
  ws=new WebSocket(`${location.protocol==='https:'?'wss':'ws'}://${location.host}/api/ws/camara-remota/${encodeURIComponent(token)}/movil`);
  ws.onopen=()=>{estado.textContent='Esperando al counter…';enviar({tipo:'movil-listo'})};
  ws.onmessage=async e=>{const m=JSON.parse(e.data);if(m.tipo==='pc-conectado'){enviar({tipo:'movil-listo'})}else if(m.tipo==='offer'){await pc.setRemoteDescription(m.sdp);const a=await pc.createAnswer();await pc.setLocalDescription(a);enviar({tipo:'answer',sdp:pc.localDescription})}else if(m.tipo==='candidate'&&m.candidate){await pc.addIceCandidate(m.candidate)}else if(m.tipo==='resultado'){resultado.textContent=m.mensaje||'Ingreso registrado correctamente';resultado.style.display='flex';setTimeout(()=>resultado.style.display='none',3000)}};
  ws.onclose=()=>estado.textContent='Conexión pausada. Recarga esta página para reconectar.';
 }catch(e){boton.style.display='block';estado.textContent=e.name==='NotAllowedError'?'Debes permitir el uso de la cámara frontal':'No se pudo iniciar la cámara';}
}
boton.addEventListener('click',conectar);
</script>
</body>
</html>
