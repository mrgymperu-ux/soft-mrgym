<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Comercial - Soft-Gym</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .comercial-filtros{display:flex;align-items:end;gap:10px;flex-wrap:wrap;margin-bottom:16px}
        .comercial-filtros .form-group{margin:0;min-width:120px}
        .comercial-kpis{display:grid;grid-template-columns:repeat(3,minmax(180px,1fr));gap:12px;margin-bottom:16px}
        .comercial-kpi{padding:14px 16px;border:1px solid var(--color-borde);border-top:3px solid var(--color-primario);border-radius:10px;background:var(--color-blanco)}
        .comercial-kpi span{display:block;color:var(--color-texto-secundario);font-size:.72em;margin-bottom:5px}
        .comercial-kpi strong{display:block;color:var(--color-primario);font-size:1.15em}
        .comercial-kpi small{display:block;color:var(--color-texto-secundario);font-size:.68em;margin-top:4px}
        .comercial-tabla{border-collapse:separate;border-spacing:0}
        .comercial-tabla th,.comercial-tabla td{font-size:.76em;padding:10px 8px;text-align:right;white-space:nowrap}
        .comercial-tabla th{vertical-align:middle;text-align:center}
        .comercial-tabla td:first-child{text-align:left;font-weight:600}
        .comercial-tabla thead tr:first-child th{color:var(--color-blanco);background:var(--color-primario);border-bottom:1px solid var(--color-primario-oscuro)}
        .comercial-tabla thead tr:nth-child(2) th{color:var(--color-texto);background:var(--color-fondo);font-weight:600}
        .comercial-tabla .inicio-bloque{border-left:2px solid var(--color-primario)}
        .comercial-tabla tfoot td{font-weight:700;border-top:2px solid var(--color-borde)}
        @media(max-width:1100px){.comercial-wrap{overflow-x:auto}.comercial-tabla{min-width:1050px}}
        @media(max-width:600px){.comercial-kpis{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="app-layout">
    <div id="sidebar-container"></div>
    <main class="main-content">
        <div class="header">
            <div><h1 class="header-title">Comercial</h1><p class="header-subtitle">Ventas y comisiones del staff</p></div>
        </div>
        <div class="card" style="padding:18px;">
            <div class="comercial-filtros">
                <div class="form-group"><label>Año</label><input id="co-anio" type="number" min="2020" max="2100"></div>
                <div class="form-group"><label>Mes</label><select id="co-mes">
                    <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
                    <option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
                    <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
                    <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
                </select></div>
                <button class="btn btn-primary" onclick="cargarComercial()">Consultar</button>
            </div>
            <div class="comercial-kpis" id="co-kpis"></div>
            <div class="comercial-wrap">
                <table class="table comercial-tabla">
                    <thead>
                        <tr><th rowspan="2">Staff</th><th colspan="3" class="inicio-bloque">Membresías</th><th colspan="2" class="inicio-bloque">Venta rápida</th><th colspan="4" class="inicio-bloque">Planilla</th></tr>
                        <tr><th class="inicio-bloque">Ventas</th><th>Meta</th><th>Comisión</th><th class="inicio-bloque">Ventas</th><th>Comisión</th><th class="inicio-bloque">Total</th><th>Pagado</th><th>Saldo anterior</th><th>Saldo actual</th></tr>
                    </thead>
                    <tbody id="co-body"><tr class="empty-row"><td colspan="10">Cargando...</td></tr></tbody>
                    <tfoot id="co-foot"></tfoot>
                </table>
            </div>
        </div>
    </main>
</div>
<script src="js/api.js"></script>
<script src="js/sidebar.js"></script>
<script>
    let monedaComercial = "S/";
    const dineroCo = (valor) => formatCurrency(Number(valor || 0), monedaComercial);
    async function cargarComercial(){
        const anio=parseInt(document.getElementById("co-anio").value), mes=parseInt(document.getElementById("co-mes").value);
        const body=document.getElementById("co-body"); body.innerHTML='<tr class="empty-row"><td colspan="10">Cargando...</td></tr>';
        try{
            const datos=await apiFetch(`/comercial/resumen?anio=${anio}&mes=${mes}`); monedaComercial=datos.moneda||"S/";
            const filas=datos.filas||[];
            body.innerHTML=filas.length?filas.map(f=>`<tr><td>${escapeHTML(f.nombre)}</td><td class="inicio-bloque">${dineroCo(f.ventas_membresias)}</td><td>${dineroCo(f.meta_membresias)}</td><td>${dineroCo(f.comision_membresias)}</td><td class="inicio-bloque">${dineroCo(f.venta_rapida)}</td><td>${dineroCo(f.comision_venta_rapida)}</td><td class="inicio-bloque">${dineroCo(f.planilla_total)}</td><td>${dineroCo(f.planilla_pagado)}</td><td>${dineroCo(f.planilla_saldo_anterior)}</td><td>${dineroCo(f.planilla_saldo)}</td></tr>`).join(""):'<tr class="empty-row"><td colspan="10">No hay personal activo</td></tr>';
            const suma=c=>filas.reduce((s,f)=>s+Number(f[c]||0),0), meta=filas[0]?.meta_membresias||0;
            const campos=["ventas_membresias",null,"comision_membresias","venta_rapida","comision_venta_rapida","planilla_total","planilla_pagado","planilla_saldo_anterior","planilla_saldo"];
            document.getElementById("co-foot").innerHTML=filas.length?`<tr><td>Total</td>${campos.map((c,i)=>`<td class="${[0,3,5].includes(i)?'inicio-bloque':''}">${c?dineroCo(suma(c)):'—'}</td>`).join("")}</tr>`:"";
            const ventas=suma("ventas_membresias");
            document.getElementById("co-kpis").innerHTML=`<div class="comercial-kpi"><span>Membresías</span><strong>${dineroCo(ventas)}</strong><small>Meta del mes: ${dineroCo(meta)} · Comisión: ${dineroCo(suma("comision_membresias"))}</small></div><div class="comercial-kpi"><span>Venta rápida</span><strong>${dineroCo(suma("venta_rapida"))}</strong><small>Comisión: ${dineroCo(suma("comision_venta_rapida"))}</small></div><div class="comercial-kpi"><span>Planilla</span><strong>${dineroCo(suma("planilla_total"))}</strong><small>Pagado: ${dineroCo(suma("planilla_pagado"))} · Saldo: ${dineroCo(suma("planilla_saldo"))}</small></div>`;
        }catch(e){body.innerHTML=`<tr class="empty-row"><td colspan="10">${escapeHTML(e.message)}</td></tr>`;document.getElementById("co-foot").innerHTML="";document.getElementById("co-kpis").innerHTML=""}
    }
    document.addEventListener("DOMContentLoaded",()=>{const hoy=new Date();document.getElementById("co-anio").value=hoy.getFullYear();document.getElementById("co-mes").value=hoy.getMonth()+1;cargarComercial()});
</script>
</body>
</html>
