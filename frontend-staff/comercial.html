<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Comercial - Soft-Gym</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/tema.js?v=20260722-1"></script>
    <style>
        .comercial-filtros{display:flex;align-items:end;gap:10px;flex-wrap:wrap}
        .comercial-filtros .form-group{margin:0;min-width:120px}
        .comercial-bloques{display:grid;grid-template-columns:minmax(0,1.25fr) minmax(0,.75fr);gap:16px;margin-top:16px;align-items:start}
        .comercial-bloque{padding:0;overflow:hidden;border:1px solid var(--color-borde);border-top:4px solid var(--color-primario)}
        .comercial-bloque.planilla{grid-column:1/-1}
        .comercial-resumen{display:flex;gap:20px;flex-wrap:wrap;padding:12px 16px;background:var(--color-blanco);border-bottom:1px solid var(--color-borde)}
        .comercial-resumen div{min-width:110px}
        .comercial-resumen span{display:block;color:var(--color-texto-secundario);font-size:.72em;margin-bottom:3px}
        .comercial-resumen strong{color:var(--color-primario);font-size:1.05em}
        .comercial-wrap{overflow-x:auto}
        .comercial-tabla{border-collapse:separate;border-spacing:0;margin:0;min-width:100%}
        .comercial-tabla th,.comercial-tabla td{font-size:.76em;padding:10px 9px;text-align:right;white-space:nowrap}
        .comercial-tabla th{text-align:center;vertical-align:middle}
        .comercial-tabla td:first-child{text-align:left;font-weight:600}
        .comercial-tabla thead tr:first-child th{color:var(--color-blanco);background:var(--color-primario);font-size:.84em}
        .comercial-tabla thead tr:nth-child(2) th{color:var(--color-texto);background:var(--color-fondo);font-weight:600}
        .comercial-tabla tfoot td{font-weight:700;border-top:2px solid var(--color-borde)}
        @media(max-width:900px){.comercial-bloques{grid-template-columns:1fr}.comercial-bloque.planilla{grid-column:auto}}
        @media(max-width:600px){.comercial-resumen{gap:12px}.comercial-resumen div{min-width:calc(50% - 12px)}}
    </style>
</head>
<body>
<div class="app-layout">
    <div id="sidebar-container"></div>
    <main class="main-content">
        <div class="header">
            <div><h1 class="header-title">Comercial</h1><p class="header-subtitle">Ventas, comisiones y planilla del staff</p></div>
        </div>
        <div class="card" style="padding:18px;">
            <div class="comercial-filtros">
                <div class="form-group"><label>Año</label><input id="co-anio" type="number" min="2020" max="2100"></div>
                <div class="form-group"><label>Mes</label><select id="co-mes">
                    <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
                    <option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
                    <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
                    <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
                </select></div>
                <button class="btn btn-primary" onclick="cargarComercial()">Consultar</button>
            </div>
        </div>

        <div class="comercial-bloques">
            <section class="card comercial-bloque">
                <div class="comercial-resumen" id="co-resumen-membresias"></div>
                <div class="comercial-wrap">
                    <table class="table comercial-tabla">
                        <thead><tr><th colspan="4">Membresías</th></tr><tr><th>Staff</th><th>Ventas</th><th>Meta</th><th>Comisión</th></tr></thead>
                        <tbody id="co-body-membresias"><tr class="empty-row"><td colspan="4">Cargando...</td></tr></tbody>
                        <tfoot id="co-foot-membresias"></tfoot>
                    </table>
                </div>
            </section>

            <section class="card comercial-bloque">
                <div class="comercial-resumen" id="co-resumen-venta"></div>
                <div class="comercial-wrap">
                    <table class="table comercial-tabla">
                        <thead><tr><th colspan="3">Venta rápida</th></tr><tr><th>Staff</th><th>Ventas</th><th>Comisión</th></tr></thead>
                        <tbody id="co-body-venta"><tr class="empty-row"><td colspan="3">Cargando...</td></tr></tbody>
                        <tfoot id="co-foot-venta"></tfoot>
                    </table>
                </div>
            </section>

            <section class="card comercial-bloque planilla">
                <div class="comercial-resumen" id="co-resumen-planilla"></div>
                <div class="comercial-wrap">
                    <table class="table comercial-tabla">
                        <thead><tr><th colspan="5">Planilla</th></tr><tr><th>Staff</th><th>Total</th><th>Pagado</th><th>Saldo anterior</th><th>Saldo actual</th></tr></thead>
                        <tbody id="co-body-planilla"><tr class="empty-row"><td colspan="5">Cargando...</td></tr></tbody>
                        <tfoot id="co-foot-planilla"></tfoot>
                    </table>
                </div>
            </section>
        </div>
    </main>
</div>
<script src="js/api.js"></script>
<script src="js/sidebar.js"></script>
<script>
    let monedaComercial = "S/";
    const dineroCo = (valor) => formatCurrency(Number(valor || 0), monedaComercial);
    const resumenCo = (items) => items.map(([etiqueta, valor]) => `<div><span>${etiqueta}</span><strong>${dineroCo(valor)}</strong></div>`).join("");
    const estadoCo = (mensaje) => {
        document.getElementById("co-body-membresias").innerHTML = `<tr class="empty-row"><td colspan="4">${mensaje}</td></tr>`;
        document.getElementById("co-body-venta").innerHTML = `<tr class="empty-row"><td colspan="3">${mensaje}</td></tr>`;
        document.getElementById("co-body-planilla").innerHTML = `<tr class="empty-row"><td colspan="5">${mensaje}</td></tr>`;
    };

    async function cargarComercial(){
        const anio=parseInt(document.getElementById("co-anio").value), mes=parseInt(document.getElementById("co-mes").value);
        estadoCo("Cargando...");
        try{
            const datos=await apiFetch(`/comercial/resumen?anio=${anio}&mes=${mes}`); monedaComercial=datos.moneda||"S/";
            const filas=datos.filas||[], suma=c=>filas.reduce((s,f)=>s+Number(f[c]||0),0), vacio="No hay personal activo";
            const meta=Number(filas[0]?.meta_membresias||0);

            document.getElementById("co-body-membresias").innerHTML=filas.length?filas.map(f=>`<tr><td>${escapeHTML(f.nombre)}</td><td>${dineroCo(f.ventas_membresias)}</td><td>${dineroCo(f.meta_membresias)}</td><td>${dineroCo(f.comision_membresias)}</td></tr>`).join(""):`<tr class="empty-row"><td colspan="4">${vacio}</td></tr>`;
            document.getElementById("co-body-venta").innerHTML=filas.length?filas.map(f=>`<tr><td>${escapeHTML(f.nombre)}</td><td>${dineroCo(f.venta_rapida)}</td><td>${dineroCo(f.comision_venta_rapida)}</td></tr>`).join(""):`<tr class="empty-row"><td colspan="3">${vacio}</td></tr>`;
            document.getElementById("co-body-planilla").innerHTML=filas.length?filas.map(f=>`<tr><td>${escapeHTML(f.nombre)}</td><td>${dineroCo(f.planilla_total)}</td><td>${dineroCo(f.planilla_pagado)}</td><td>${dineroCo(f.planilla_saldo_anterior)}</td><td>${dineroCo(f.planilla_saldo)}</td></tr>`).join(""):`<tr class="empty-row"><td colspan="5">${vacio}</td></tr>`;

            document.getElementById("co-foot-membresias").innerHTML=filas.length?`<tr><td>Total</td><td>${dineroCo(suma("ventas_membresias"))}</td><td>${dineroCo(meta)}</td><td>${dineroCo(suma("comision_membresias"))}</td></tr>`:"";
            document.getElementById("co-foot-venta").innerHTML=filas.length?`<tr><td>Total</td><td>${dineroCo(suma("venta_rapida"))}</td><td>${dineroCo(suma("comision_venta_rapida"))}</td></tr>`:"";
            document.getElementById("co-foot-planilla").innerHTML=filas.length?`<tr><td>Total</td><td>${dineroCo(suma("planilla_total"))}</td><td>${dineroCo(suma("planilla_pagado"))}</td><td>${dineroCo(suma("planilla_saldo_anterior"))}</td><td>${dineroCo(suma("planilla_saldo"))}</td></tr>`:"";

            document.getElementById("co-resumen-membresias").innerHTML=resumenCo([["Ventas",suma("ventas_membresias")],["Meta del mes",meta],["Comisiones",suma("comision_membresias")]]);
            document.getElementById("co-resumen-venta").innerHTML=resumenCo([["Ventas",suma("venta_rapida")],["Comisiones",suma("comision_venta_rapida")]]);
            document.getElementById("co-resumen-planilla").innerHTML=resumenCo([["Total",suma("planilla_total")],["Pagado",suma("planilla_pagado")],["Saldo anterior",suma("planilla_saldo_anterior")],["Saldo actual",suma("planilla_saldo")]]);
        }catch(e){
            estadoCo(escapeHTML(e.message));
            ["membresias","venta","planilla"].forEach(id=>{document.getElementById(`co-foot-${id}`).innerHTML="";document.getElementById(`co-resumen-${id}`).innerHTML=""});
        }
    }
    document.addEventListener("DOMContentLoaded",()=>{const hoy=new Date();document.getElementById("co-anio").value=hoy.getFullYear();document.getElementById("co-mes").value=hoy.getMonth()+1;cargarComercial()});
</script>
</body>
</html>
