<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear PIN - Soft-Gym</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
    <main class="login-card">
        <h1>Crear mi PIN</h1>
        <p>Elige un PIN personal de 6 dígitos. Lo usarás para ingresar en el Counter del gimnasio.</p>
        <div class="form-group">
            <label>PIN de 6 dígitos</label>
            <input id="pin" type="text" class="pin-counter-input" inputmode="numeric" maxlength="6" pattern="[0-9]{6}" autocomplete="off" placeholder="Ejemplo: 482615">
        </div>
        <div class="form-group">
            <label>Confirmar PIN</label>
            <input id="confirmar" type="text" class="pin-counter-input" inputmode="numeric" maxlength="6" pattern="[0-9]{6}" autocomplete="off" placeholder="Repite el PIN">
        </div>
        <button class="btn btn-primary" id="guardar">Crear mi PIN</button>
        <div id="mensaje" style="margin-top:12px;"></div>
    </main>
    <script src="js/api.js"></script>
    <script>
        const token = new URLSearchParams(location.search).get("token") || "";
        document.getElementById("guardar").onclick = async () => {
            const pin = document.getElementById("pin").value.trim();
            const confirmar = document.getElementById("confirmar").value.trim();
            const mensaje = document.getElementById("mensaje");
            if (!/^\d{6}$/.test(pin)) {
                mensaje.textContent = "El PIN debe tener exactamente 6 dígitos.";
                return;
            }
            if (pin !== confirmar) {
                mensaje.textContent = "Los PIN no coinciden.";
                return;
            }
            try {
                const respuesta = await fetch(`${API_BASE_URL}/auth/configurar-pin-invitacion`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token, pin }),
                });
                const datos = await respuesta.json();
                if (!respuesta.ok) throw new Error(datos.detail || "No se pudo crear el PIN");
                mensaje.textContent = datos.message;
                document.getElementById("guardar").disabled = true;
                document.getElementById("pin").disabled = true;
                document.getElementById("confirmar").disabled = true;
            } catch (error) {
                mensaje.textContent = error.message;
            }
        };
    </script>
</body>
</html>
