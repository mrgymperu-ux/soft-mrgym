<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Soft-Gym</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/tema.js"></script>
    <style>
        .dashboard-filtro { display:flex;align-items:center;gap:8px; }
        .dashboard-filtro select { min-width:105px;padding:8px 10px;border:1px solid var(--color-borde);background:var(--color-blanco);color:var(--color-texto); }
        .kpis { display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:13px;margin-bottom:15px; }
        .kpi { background:var(--color-blanco);border:1px solid var(--color-borde);padding:15px 17px;min-height:86px; }
        .kpi span { display:block;font-size:.73em;color:var(--color-texto-secundario);margin-bottom:8px; }
        .kpi strong { font-size:1.42em;line-height:1; }
        .kpi small { display:block;font-size:.68em;color:var(--color-texto-secundario);margin-top:7px; }
        .dashboard-grid { display:grid;grid-template-columns:1.35fr 1fr;gap:14px; }
        .grafica-card { background:var(--color-blanco);border:1px solid var(--color-borde);padding:16px;min-width:0; }
        .grafica-card.ancha { grid-column:1/-1; }
        .grafica-head { display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px; }
        .grafica-head h2 { font-size:.9em;margin:0 0 3px; }
        .grafica-head p { font-size:.7em;color:var(--color-texto-secundario);margin:0; }
        .leyenda { display:flex;gap:12px;flex-wrap:wrap;font-size:.68em;color:var(--color-texto-secundario); }
        .leyenda i { display:inline-block;width:8px;height:8px;margin-right:4px; }
        .barras { height:220px;display:flex;align-items:flex-end;gap:8px;padding:12px 4px 0;background:repeating-linear-gradient(to top,var(--color-borde) 0 1px,transparent 1px 25%); }
        .mes-barras { flex:1;height:100%;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;min-width:28px; }
        .par-barras { flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center;gap:2px; }
        .barra { width:38%;max-width:18px;min-height:1px;transition:height .25s; }
        .barra.ingreso { background:#45B9EC; }.barra.egreso { background:#EE7D77; }.barra.membresia { background:#7BC785; }.barra.producto { background:#FDBA4D; }
        .mes-label { font-size:.62em;color:var(--color-texto-secundario);margin-top:6px; }
        .linea-grafica { display:grid;grid-template-columns:46px minmax(0,1fr);height:220px; }
        .linea-eje-y { height:190px;display:flex;flex-direction:column;justify-content:space-between;align-items:flex-end;padding:0 7px 0 0;border-right:1px solid var(--color-borde);font-size:.61em;color:var(--color-texto-secundario); }
        .linea-wrap { min-width:0;height:220px;position:relative; }
        .linea-wrap svg { width:100%;height:190px;overflow:visible;background:repeating-linear-gradient(to top,var(--color-borde) 0 1px,transparent 1px 25%); }
        .linea-labels { display:grid;grid-template-columns:repeat(12,1fr);font-size:.61em;color:var(--color-texto-secundario);text-align:center; }
        .donut-layout { display:flex;align-items:center;justify-content:center;gap:28px;min-height:220px; }
        .donut { width:155px;height:155px;border-radius:50%;position:relative;flex-shrink:0; }
        .donut::after { content:"";position:absolute;inset:29px;border-radius:50%;background:var(--color-blanco); }
        .donut-centro { position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;font-size:.65em;color:var(--color-texto-secundario); }
        .donut-centro strong { font-size:1.65em;color:var(--color-texto); }
        .donut-detalle { min-width:145px;font-size:.76em; }
        .donut-fila { display:flex;justify-content:space-between;gap:16px;padding:7px 0;border-bottom:1px solid var(--color-borde); }
        .donut-fila i { display:inline-block;width:8px;height:8px;margin-right:6px; }
        .cargando { grid-column:1/-1;padding:50px;text-align:center;color:var(--color-texto-secundario); }
        @media(max-width:900px){.kpis{grid-template-columns:1fr 1fr}.dashboard-grid{grid-template-columns:1fr}.grafica-card.ancha{grid-column:auto}}
        @media(max-width:560px){.header{align-items:flex-start}.kpis{grid-template-columns:1fr 1fr;gap:8px}.kpi{padding:12px}.kpi strong{font-size:1.15em}.grafica-card{padding:12px}.barras{gap:2px}.donut-layout{flex-direction:column;gap:12px}.dashboard-filtro{width:100%}.dashboard-filtro select{flex:1}.linea-grafica{grid-template-columns:38px minmax(0,1fr)}.linea-eje-y{padding-right:5px;font-size:.56em}}
    </style>
</head>
<body>
<div class="app-layout">
    <div id="sidebar-container"></div>
    <main class="main-content">
        <div class="header">
            <div><h1 class="header-title">Dashboard</h1><p class="header-subtitle">Evolución general del gimnasio con información real</p></div>
            <div class="dashboard-filtro"><select id="anio" onchange="cargar()"></select><button class="btn btn-secondary btn-sm" onclick="cargar()">Actualizar</button></div>
        </div>
        <div id="contenido"><div class="cargando">Cargando indicadores...</div></div>
    </main>
</div>
<script src="js/api.js"></script>
<script src="js/sidebar.js"></script>
<script>
    const MESES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
    function prepararAnios() {
        const actual = new Date().getFullYear(), sel = document.getElementById("anio");
        sel.innerHTML = Array.from({length:6},(_,i)=>actual-i).map(a=>`<option>${a}</option>`).join("");
    }
    function moneda(valor, simbolo) { return `${simbolo} ${Number(valor||0).toLocaleString("es-PE",{minimumFractionDigits:0,maximumFractionDigits:0})}`; }
    function barraDoble(serieA, serieB, claseA, claseB) {
        const max = Math.max(...serieA,...serieB,1);
        return `<div class="barras">${MESES.map((mes,i)=>`<div class="mes-barras"><div class="par-barras"><div class="barra ${claseA}" style="height:${serieA[i]/max*100}%" title="${mes}: ${serieA[i]}"></div><div class="barra ${claseB}" style="height:${serieB[i]/max*100}%" title="${mes}: ${serieB[i]}"></div></div><span class="mes-label">${mes}</span></div>`).join("")}</div>`;
    }
    let secuenciaLinea = 0;
    function graficaLinea(valores, color) {
        const idGradiente = `relleno-linea-${++secuenciaLinea}`;
        const maxDato = Math.max(...valores, 0);
        const magnitud = maxDato > 0 ? Math.pow(10, Math.floor(Math.log10(maxDato))) : 1;
        const normalizado = maxDato / magnitud;
        const factor = normalizado <= 1 ? 1 : normalizado <= 2 ? 2 : normalizado <= 5 ? 5 : 10;
        const maxEscala = Math.max(factor * magnitud, 4);
        const w=600, h=175, margen=7;
        const puntos = valores.map((v,i) => ({x:margen+i*(w-margen*2)/11, y:h-margen-(v/maxEscala*(h-margen*2))}));
        let curva = `M ${puntos[0].x},${puntos[0].y}`;
        for (let i=0;i<puntos.length-1;i++) {
            const p0=puntos[i-1]||puntos[i], p1=puntos[i], p2=puntos[i+1], p3=puntos[i+2]||p2;
            const cp1x=p1.x+(p2.x-p0.x)/6, cp1y=p1.y+(p2.y-p0.y)/6;
            const cp2x=p2.x-(p3.x-p1.x)/6, cp2y=p2.y-(p3.y-p1.y)/6;
            curva += ` C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2.x},${p2.y}`;
        }
        const area = `${curva} L ${puntos[puntos.length-1].x},${h} L ${puntos[0].x},${h} Z`;
        const formatoEje = v => v >= 1000 ? `${(v/1000).toLocaleString("es-PE",{maximumFractionDigits:1})}k` : v.toLocaleString("es-PE",{maximumFractionDigits:1});
        const niveles = [maxEscala,maxEscala*.75,maxEscala*.5,maxEscala*.25,0];
        return `<div class="linea-grafica"><div class="linea-eje-y">${niveles.map(v=>`<span>${formatoEje(v)}</span>`).join("")}</div><div class="linea-wrap"><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><defs><linearGradient id="${idGradiente}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity=".28"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><path d="${area}" fill="url(#${idGradiente})"/><path d="${curva}" fill="none" stroke="${color}" stroke-width="4" vector-effect="non-scaling-stroke" stroke-linecap="round" stroke-linejoin="round"/>${puntos.map((p,i)=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="${color}"><title>${MESES[i]}: ${valores[i]}</title></circle>`).join("")}</svg><div class="linea-labels">${MESES.map(m=>`<span>${m}</span>`).join("")}</div></div></div>`;
    }
    function donut(valores, colores, total, centro, formato=v=>v) {
        let acumulado=0;
        const cortes=valores.map((v,i)=>{const ini=total?acumulado/total*360:0;acumulado+=v;const fin=total?acumulado/total*360:0;return `${colores[i]} ${ini}deg ${fin}deg`;}).join(",");
        return `<div class="donut" style="background:conic-gradient(${total ? cortes : '#E4E8EB 0deg 360deg'})"><div class="donut-centro"><strong>${formato(total)}</strong>${centro}</div></div>`;
    }
    function render(d) {
        const totalClientes=d.clientes_con_membresia+d.clientes_sin_membresia;
        const composicion=[d.ingresos_membresias.reduce((a,b)=>a+b,0),d.ingresos_productos.reduce((a,b)=>a+b,0),d.otros_ingresos.reduce((a,b)=>a+b,0)];
        const totalComp=composicion.reduce((a,b)=>a+b,0);
        document.getElementById("contenido").innerHTML=`
            <section class="kpis"><div class="kpi"><span>Ingresos del año</span><strong>${moneda(d.total_ingresos,d.moneda)}</strong><small>Todos los cobros registrados</small></div><div class="kpi"><span>Balance</span><strong style="color:${d.total_balance>=0?'#55B66B':'#D56762'}">${moneda(d.total_balance,d.moneda)}</strong><small>Ingresos menos egresos</small></div><div class="kpi"><span>Clientes activos</span><strong>${d.clientes_activos}</strong><small>${d.clientes_con_membresia} con membresía vigente</small></div><div class="kpi"><span>Accesos del año</span><strong>${d.total_accesos}</strong><small>Asistencias registradas</small></div></section>
            <div class="dashboard-grid">
                <section class="grafica-card ancha"><div class="grafica-head"><div><h2>Balance mensual</h2><p>Ingresos y egresos registrados</p></div><div class="leyenda"><span><i style="background:#45B9EC"></i>Ingresos</span><span><i style="background:#EE7D77"></i>Egresos</span></div></div>${barraDoble(d.ingresos,d.egresos,'ingreso','egreso')}</section>
                <section class="grafica-card"><div class="grafica-head"><div><h2>Nuevos clientes</h2><p>Altas registradas por mes</p></div></div>${graficaLinea(d.altas_clientes,'#F5A93B')}</section>
                <section class="grafica-card"><div class="grafica-head"><div><h2>Estado de clientes</h2><p>Situación actual</p></div></div><div class="donut-layout">${donut([d.clientes_con_membresia,d.clientes_sin_membresia],['#57BDEB','#DDE5EA'],totalClientes,'clientes')}<div class="donut-detalle"><div class="donut-fila"><span><i style="background:#57BDEB"></i>Con membresía</span><strong>${d.clientes_con_membresia}</strong></div><div class="donut-fila"><span><i style="background:#DDE5EA"></i>Sin membresía</span><strong>${d.clientes_sin_membresia}</strong></div></div></div></section>
                <section class="grafica-card ancha"><div class="grafica-head"><div><h2>Ventas mensuales</h2><p>Ingresos por membresías y productos</p></div><div class="leyenda"><span><i style="background:#7BC785"></i>Membresías</span><span><i style="background:#FDBA4D"></i>Productos</span></div></div>${barraDoble(d.ingresos_membresias,d.ingresos_productos,'membresia','producto')}</section>
                <section class="grafica-card"><div class="grafica-head"><div><h2>Accesos al gimnasio</h2><p>Asistencias por mes</p></div></div>${graficaLinea(d.accesos,'#44B7EA')}</section>
                <section class="grafica-card"><div class="grafica-head"><div><h2>Composición de ingresos</h2><p>Distribución anual</p></div></div><div class="donut-layout">${donut(composicion,['#62C879','#52B9E8','#F7BD52'],totalComp,'total',v=>moneda(v,d.moneda))}<div class="donut-detalle"><div class="donut-fila"><span><i style="background:#62C879"></i>Membresías</span><strong>${moneda(composicion[0],d.moneda)}</strong></div><div class="donut-fila"><span><i style="background:#52B9E8"></i>Productos</span><strong>${moneda(composicion[1],d.moneda)}</strong></div><div class="donut-fila"><span><i style="background:#F7BD52"></i>Otros</span><strong>${moneda(composicion[2],d.moneda)}</strong></div></div></div></section>
            </div>`;
    }
    async function cargar(){try{document.getElementById("contenido").innerHTML='<div class="cargando">Cargando indicadores...</div>';render(await apiFetch(`/dashboard/empresarial?anio=${document.getElementById("anio").value}`));}catch(e){showError(e.message);}}
    prepararAnios(); cargar();
</script>
</body>
</html>
