<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresos - Soft-Gym</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/tema.js"></script>
    <style>
        .filtros-bar { display:flex; flex-wrap:wrap; align-items:center; gap:10px; padding:14px 18px; background:var(--color-blanco); border-radius:var(--radio); box-shadow:var(--sombra); margin-bottom:18px; }
        .filtros-bar label { font-size:0.82em; color:var(--color-texto-secundario); display:flex; align-items:center; gap:5px; }
        .filtros-bar input[type=date] { padding:6px 10px; border:1px solid var(--color-borde); border-radius:8px; font-size:0.82em; background:var(--color-fondo); color:var(--color-texto); }
        .filtros-bar input[type=checkbox] { width:auto; margin:0; }
        .check-hoy { accent-color:var(--color-primario); }

        .chips-tipo { display:flex; gap:6px; flex-wrap:wrap; }
        .chip-tipo { padding:5px 12px; border-radius:14px; border:1px solid var(--color-borde); font-size:0.78em; cursor:pointer; background:var(--color-fondo); color:var(--color-texto-secundario); transition:.15s; user-select:none; }
        .chip-tipo.activo { background:var(--color-primario); color:#fff; border-color:var(--color-primario); }

        .resumen-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:18px; }
        .r-card { background:var(--color-blanco); border-radius:var(--radio); box-shadow:var(--sombra); padding:14px 18px; }
        .r-card-label { font-size:0.72em; color:var(--color-texto-secundario); margin-bottom:4px; }
        .r-card-valor { font-size:1.25em; font-weight:700; }
        .r-card.total .r-card-valor { color:var(--color-primario); }
        .r-card.mem .r-card-valor   { color:#00B894; }
        .r-card.prod .r-card-valor  { color:#0984E3; }
        .r-card.otros .r-card-valor { color:#636E72; }

        .badge-cat { font-size:0.65em; padding:2px 8px; border-radius:10px; font-weight:600; }
        .cat-membresias { background:#E6FBF5; color:#00B894; }
        .cat-productos  { background:#EAF3FF; color:#0984E3; }
        .cat-otros      { background:#F0F0F5; color:#636E72; }
    </style>
</head>
<body>
<div class="app-layout">
    <div id="sidebar-container"></div>
    <main class="main-content">
        <div class="header">
            <div>
                <h1 class="header-title">💰 Ingresos</h1>
                <p class="header-subtitle" id="subtitulo-rango">Cargando...</p>
            </div>
        </div>

        <!-- Filtros -->
        <div class="filtros-bar">
            <label><input type="checkbox" id="chk-hoy" class="check-hoy" onchange="onCheckHoy()"> Hoy</label>
            <label>Desde <input type="date" id="f-desde" onchange="onFechaChange()"></label>
            <label>Hasta <input type="date" id="f-hasta" onchange="onFechaChange()"></label>
            <div class="chips-tipo" id="chips-tipo">
                <span class="chip-tipo activo" data-tipo="" onclick="onChipTipo(this)">Todos</span>
                <span class="chip-tipo" data-tipo="membresias" onclick="onChipTipo(this)">🎫 Membresías</span>
                <span class="chip-tipo" data-tipo="productos" onclick="onChipTipo(this)">📦 Productos</span>
                <span class="chip-tipo" data-tipo="otros" onclick="onChipTipo(this)">💼 Otros</span>
            </div>
            <button class="btn btn-secondary btn-sm" style="margin-left:auto;" onclick="cargar()">🔄 Actualizar</button>
        </div>

        <!-- Totales -->
        <div class="resumen-cards">
            <div class="r-card total"><div class="r-card-label">Total</div><div class="r-card-valor" id="tot-total">—</div></div>
            <div class="r-card mem"><div class="r-card-label">🎫 Membresías</div><div class="r-card-valor" id="tot-mem">—</div></div>
            <div class="r-card prod"><div class="r-card-label">📦 Productos</div><div class="r-card-valor" id="tot-prod">—</div></div>
            <div class="r-card otros"><div class="r-card-label">💼 Otros</div><div class="r-card-valor" id="tot-otros">—</div></div>
        </div>

        <!-- Tabla -->
        <div class="card">
            <div class="table-container">
                <table class="table">
                    <thead><tr><th>Fecha</th><th>Categoría</th><th>Descripción</th><th style="text-align:right;">Monto</th></tr></thead>
                    <tbody id="tabla-ingresos"><tr class="empty-row"><td colspan="4">Cargando...</td></tr></tbody>
                </table>
            </div>
            <div id="pie-tabla" style="padding:12px 18px;font-size:0.78em;color:#636E72;border-top:1px solid var(--color-borde);"></div>
        </div>
    </main>
</div>

<script src="js/api.js"></script>
<script src="js/sidebar.js"></script>
<script>
    let tipoActivo = "";
    let moneda = "S/";

    // --- Fechas por defecto: mes actual ---
    function initFechas() {
        const hoy = new Date();
        const y = hoy.getFullYear(), m = hoy.getMonth();
        const d1 = new Date(y, m, 1);
        const d2 = new Date(y, m + 1, 0);
        document.getElementById("f-desde").value = isoFecha(d1);
        document.getElementById("f-hasta").value = isoFecha(d2);
    }

    function isoFecha(d) { return fechaLocalISO(d); }

    function onCheckHoy() {
        const chk = document.getElementById("chk-hoy").checked;
        document.getElementById("f-desde").disabled = chk;
        document.getElementById("f-hasta").disabled = chk;
        cargar();
    }

    function onFechaChange() {
        document.getElementById("chk-hoy").checked = false;
        document.getElementById("f-desde").disabled = false;
        document.getElementById("f-hasta").disabled = false;
        cargar();
    }

    function onChipTipo(el) {
        document.querySelectorAll(".chip-tipo").forEach(c => c.classList.remove("activo"));
        el.classList.add("activo");
        tipoActivo = el.dataset.tipo;
        cargar();
    }

    const ETIQ = { membresias:"Membresías", productos:"Productos", otros:"Otros", otros_ingresos:"Otros" };
    const BADGE = { membresias:"cat-membresias", productos:"cat-productos", otros:"cat-otros", otros_ingresos:"cat-otros" };

    async function cargar() {
        const cfg = await getConfiguracion(); moneda = cfg.moneda;
        const chkHoy = document.getElementById("chk-hoy").checked;
        const desde  = document.getElementById("f-desde").value;
        const hasta  = document.getElementById("f-hasta").value;

        let qs = chkHoy ? "solo_hoy=true" : `desde=${desde}&hasta=${hasta}`;
        if (tipoActivo) qs += `&tipo=${tipoActivo}`;

        const data = await apiFetch(`/ingresos/?${qs}`);

        // Totales
        document.getElementById("tot-total").textContent = formatCurrency(data.total, moneda);
        document.getElementById("tot-mem").textContent   = formatCurrency(data.membresias, moneda);
        document.getElementById("tot-prod").textContent  = formatCurrency(data.productos, moneda);
        document.getElementById("tot-otros").textContent = formatCurrency(data.otros, moneda);

        // Subtítulo
        const rangoTexto = chkHoy ? "hoy" : `del ${formatFecha(desde)} al ${formatFecha(hasta)}`;
        document.getElementById("subtitulo-rango").textContent = `Ingresos ${rangoTexto}`;

        // Tabla
        const tbody = document.getElementById("tabla-ingresos");
        if (!data.detalle.length) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="4">Sin ingresos en el rango seleccionado</td></tr>';
            document.getElementById("pie-tabla").textContent = "";
            return;
        }

        tbody.innerHTML = data.detalle.map(d => `<tr>
            <td style="white-space:nowrap;font-size:1.03em;">${formatFechaHora(d.fecha)}</td>
            <td><span class="badge-cat ${BADGE[d.categoria] || ''}">${ETIQ[d.categoria] || d.categoria}</span></td>
            <td style="font-size:0.85em;">${d.descripcion}</td>
            <td style="text-align:right;font-weight:600;color:var(--color-exito);">${formatCurrency(d.monto, moneda)}</td>
        </tr>`).join("");

        document.getElementById("pie-tabla").textContent = `${data.detalle.length} registro${data.detalle.length !== 1 ? "s" : ""}`;
    }

    initFechas();
    cargar();
</script>
</body>
</html>
