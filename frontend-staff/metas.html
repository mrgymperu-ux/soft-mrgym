<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metas y Comisiones - Soft-Gym</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/tema.js"></script>
    <style>
        .metas-grid { width: 100%; border-collapse: collapse; }
        .metas-grid th, .metas-grid td { padding: 10px 14px; border-bottom: 1px solid var(--color-borde); text-align: left; }
        .metas-grid input { width: 120px; padding: 7px 9px; border: 1px solid var(--color-borde); border-radius: 8px; font-size: 0.88em; }
        .metas-grid tr.mes-actual td { background: #EAF1FF; }
        .barra-progreso { background: #F0F0F5; border-radius: 8px; height: 8px; overflow: hidden; width: 100px; }
        .barra-progreso-fill { height: 100%; background: var(--color-exito); }
    </style>
</head>
<body>
<div class="app-layout">
    <div id="sidebar-container"></div>
    <main class="main-content">
        <div class="header">
            <div>
                <h1 class="header-title">🎯 Metas y Comisiones</h1>
                <p class="header-subtitle">Solo visible para administradores</p>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
                <button class="btn btn-secondary btn-sm" onclick="cambiarAnio(-1)">← Año anterior</button>
                <strong id="anio-actual" style="font-size:1.1em;"></strong>
                <button class="btn btn-secondary btn-sm" onclick="cambiarAnio(1)">Año siguiente →</button>
            </div>
        </div>

        <div id="aviso-no-admin" style="display:none;" class="alert alert-error">Esta seccion es solo para administradores.</div>

        <div id="contenido-admin">
            <div class="card">
                <div class="card-header"><h3 class="card-title">Proyeccion de metas mensuales (1 año)</h3></div>
                <div class="table-container">
                    <table class="metas-grid">
                        <thead><tr><th>Mes</th><th>Meta Membresias</th><th>Meta Productos</th><th>Notas</th><th></th></tr></thead>
                        <tbody id="tabla-metas"></tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Comisiones del mes</h3>
                    <select id="sel-mes-comisiones" onchange="cargarComisiones()" style="padding:8px 12px;border:1px solid var(--color-borde);border-radius:8px;"></select>
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead><tr><th>Trabajador</th><th>Ventas Membresias</th><th>% Meta</th><th>Comision</th><th>Ventas Productos</th><th>% Meta</th><th>Comision</th><th>Total</th></tr></thead>
                        <tbody id="tabla-comisiones"><tr class="empty-row"><td colspan="8">Selecciona un mes</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="js/api.js"></script>
<script src="js/sidebar.js"></script>
<script>
    requireAuth();
    let anioActual = new Date().getFullYear();
    const NOMBRES_MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

    if (!esAdministrador()) {
        document.getElementById("aviso-no-admin").style.display = "block";
        document.getElementById("contenido-admin").style.display = "none";
    } else {
        document.getElementById("anio-actual").textContent = anioActual;
        init();
    }

    function cambiarAnio(delta) {
        anioActual += delta;
        document.getElementById("anio-actual").textContent = anioActual;
        cargarMetas();
    }

    async function init() {
        const hoy = new Date();
        const selMes = document.getElementById("sel-mes-comisiones");
        selMes.innerHTML = NOMBRES_MESES.map((n, i) => `<option value="${i+1}">${n} ${anioActual}</option>`).join("");
        selMes.value = hoy.getFullYear() === anioActual ? (hoy.getMonth() + 1) : 1;
        await cargarMetas();
        await cargarComisiones();
    }

    async function cargarMetas() {
        const metas = await apiFetch(`/metas/?anio=${anioActual}`);
        const porMes = {};
        metas.forEach(m => porMes[m.mes] = m);

        const hoy = new Date();
        const tbody = document.getElementById("tabla-metas");
        tbody.innerHTML = NOMBRES_MESES.map((nombre, idx) => {
            const mes = idx + 1;
            const m = porMes[mes] || { meta_membresias: 0, meta_productos: 0, notas: "" };
            const esMesActual = hoy.getFullYear() === anioActual && (hoy.getMonth() + 1) === mes;
            return `<tr class="${esMesActual ? "mes-actual" : ""}">
                <td><strong>${nombre}</strong></td>
                <td><input type="number" id="mm-${mes}" value="${m.meta_membresias || 0}" step="0.01" min="0"></td>
                <td><input type="number" id="mp-${mes}" value="${m.meta_productos || 0}" step="0.01" min="0"></td>
                <td><input type="text" id="mn-${mes}" value="${m.notas || ""}" style="width:160px;" placeholder="Opcional"></td>
                <td><button class="btn btn-sm btn-primary" onclick="guardarMeta(${mes})">Guardar</button></td>
            </tr>`;
        }).join("");
    }

    async function guardarMeta(mes) {
        const datos = {
            meta_membresias: parseFloat(document.getElementById(`mm-${mes}`).value) || 0,
            meta_productos: parseFloat(document.getElementById(`mp-${mes}`).value) || 0,
            notas: document.getElementById(`mn-${mes}`).value.trim() || null,
        };
        try {
            await apiFetch(`/metas/${anioActual}/${mes}`, { method: "PUT", body: JSON.stringify(datos) });
            showSuccess(`Meta de ${NOMBRES_MESES[mes-1]} guardada`);
        } catch (e) { showError(e.message); }
    }

    async function cargarComisiones() {
        const mes = parseInt(document.getElementById("sel-mes-comisiones").value);
        if (!mes) return;
        const tbody = document.getElementById("tabla-comisiones");
        try {
            const config = await getConfiguracion();
            const resumen = await apiFetch(`/comisiones/resumen?anio=${anioActual}&mes=${mes}`);
            if (!resumen.length) {
                tbody.innerHTML = '<tr class="empty-row"><td colspan="8">Sin ventas registradas este mes</td></tr>';
                return;
            }
            tbody.innerHTML = resumen.map(r => `
                <tr>
                    <td><strong>${r.nombre_completo}</strong></td>
                    <td>${formatCurrency(r.ventas_membresias, config.moneda)}</td>
                    <td>
                        <div class="barra-progreso"><div class="barra-progreso-fill" style="width:${Math.min(r.porcentaje_meta_membresias,100)}%;"></div></div>
                        <span style="font-size:0.75em;">${r.porcentaje_meta_membresias}%</span>
                    </td>
                    <td>${r.porcentaje_comision_membresias}% · <strong>${formatCurrency(r.comision_membresias, config.moneda)}</strong></td>
                    <td>${formatCurrency(r.ventas_productos, config.moneda)}</td>
                    <td>
                        <div class="barra-progreso"><div class="barra-progreso-fill" style="width:${Math.min(r.porcentaje_meta_productos,100)}%;"></div></div>
                        <span style="font-size:0.75em;">${r.porcentaje_meta_productos}%</span>
                    </td>
                    <td>${r.porcentaje_comision_productos}% · <strong>${formatCurrency(r.comision_productos, config.moneda)}</strong></td>
                    <td><strong style="color:var(--color-primario);">${formatCurrency(r.comision_total, config.moneda)}</strong></td>
                </tr>
            `).join("");
        } catch (e) { showError(e.message); }
    }
</script>
</body>
</html>
