<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Restablecer contraseña - Soft-Gym</title><link rel="stylesheet" href="css/styles.css"></head>
<body class="login-page"><main class="login-card"><h1>Crear nueva contraseña</h1>
<div class="form-group"><label>Nueva contraseña</label><input id="password" type="password" minlength="10" placeholder="Mínimo 10 caracteres"></div>
<div class="form-group"><label>Confirmar contraseña</label><input id="confirmar" type="password" minlength="10"></div>
<button class="btn btn-primary" id="guardar">Actualizar contraseña</button><div id="mensaje"></div></main>
<script src="js/api.js"></script><script>
const token=new URLSearchParams(location.search).get("token")||"";
document.getElementById("guardar").onclick=async()=>{const p=document.getElementById("password").value,c=document.getElementById("confirmar").value,m=document.getElementById("mensaje");
if(p!==c){m.textContent="Las contraseñas no coinciden";return}try{const r=await fetch(`${API_BASE_URL}/auth/restablecer-password`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,nueva_password:p})});const d=await r.json();if(!r.ok)throw new Error(d.detail||"No se pudo actualizar");m.innerHTML='Contraseña actualizada. <a href="login.html">Iniciar sesión</a>';document.getElementById("guardar").disabled=true}catch(e){m.textContent=e.message}};
</script></body></html>
